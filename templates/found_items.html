<!DOCTYPE html>
<html>
<head>

    <title>Found Items</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<section class="dashboard-page">

    <div class="page-header">

        <h1>🟢 Found Items</h1>

        <a href="/" class="back-btn">
            ← Back Home
        </a>

    </div>

    <div class="items-grid">

        {% for item in items %}

        <a href="/item/found/{{ item.item_id }}" class="card-link">

            <div class="modern-card">

                {% if item.image %}
                <img
                    src="{{ url_for('static', filename='uploads/' + item.image) }}"
                    class="card-image">
                {% endif %}

                <div class="card-body">

                    <h2>{{ item.title }}</h2>

                    <p class="description">
                        {{ item.description }}
                    </p>

                    <p>
                        📍 {{ item.location_found }}
                    </p>

                    <p>
                        📅 {{ item.date_found }}
                    </p>

                    <span class="status-found">
                        FOUND
                    </span>

                </div>

            </div>

        </a>

        {% endfor %}

    </div>

</section>

</body>
</html>
