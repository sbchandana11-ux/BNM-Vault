<!DOCTYPE html>
<html>
<head>
    <title>BNM Vault Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>

<body class="auth-page">
<div class="auth-container">

    <div class="auth-card">

        <h1>Welcome Back</h1>

        <p>
            Sign in to continue to BNM Vault
        </p>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="flash-message">
                {{ messages[0] }}
            </div>
        {% endif %}
        {% endwith %}

        <form method="POST">

            <input
                type="email"
                name="email"
                placeholder="Email Address"
                required>

            <div class="password-box">

                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Password"
                    required>

                <span onclick="togglePassword()">
                    👁
                </span>

            </div>

            <button type="submit">
                Sign In
            </button>

        </form>

        <a href="/forgot_password"
           class="forgot-link">
            Forgot Password?
        </a>

        <a href="/register"
           class="auth-link">
            Create Account
        </a>

    </div>

</div>

</div>

<script>

function togglePassword(){

    const pass =
        document.getElementById("password");

    if(pass.type==="password"){
        pass.type="text";
    }
    else{
        pass.type="password";
    }

}

</script>
<script>
function togglePassword(){

    let field =
        document.getElementById("password");

    if(field.type === "password"){
        field.type = "text";
    }
    else{
        field.type = "password";
    }
}
</script>
</body>
</html>
